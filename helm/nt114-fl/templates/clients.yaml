{{- $root := . -}}
{{- range $i := until (int $root.Values.fl.clientCount) }}
{{- $clientId := add $i 1 }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: fl-client-{{ $clientId }}
  namespace: {{ $root.Values.namespace }}
  labels:
    {{- include "nt114-fl.labels" $root | nindent 4 }}
spec:
  template:
    metadata:
      labels:
        app: fl-client-{{ $clientId }}
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-server
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until [ -f {{ $root.Values.contract.addressFile }} ]; do sleep 2; done
              until nc -z fl-server {{ $root.Values.fl.serverPort }}; do sleep 2; done
          volumeMounts:
            - name: results
              mountPath: /results
      containers:
        - name: fl-client-{{ $clientId }}
          image: {{ $root.Values.image.repository }}:{{ $root.Values.image.tag }}
          imagePullPolicy: {{ $root.Values.image.pullPolicy }}
          command: ["python", "fl_client.py", "{{ $clientId }}", "{{ $root.Values.fl.splitType }}"]
          envFrom:
            - configMapRef:
                name: fl-config
          env:
            - name: CLIENT_ID
              value: "{{ $clientId }}"
            - name: SPLIT_TYPE
              value: {{ $root.Values.fl.splitType | quote }}
            - name: SERVER_ADDRESS
              value: fl-server:{{ $root.Values.fl.serverPort }}
            - name: CONTRACT_ADDRESS_FILE
              value: {{ $root.Values.contract.addressFile }}
            - name: FAULTY_CLIENTS
              value: {{ $root.Values.fl.faultyClients | quote }}
            - name: RESULTS_DIR
              value: /results
          volumeMounts:
            - name: results
              mountPath: /results
      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: fl-results
{{- end }}