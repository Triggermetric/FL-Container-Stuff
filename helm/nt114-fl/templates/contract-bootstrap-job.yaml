apiVersion: batch/v1
kind: Job
metadata:
  name: reputation-deploy-{{ .Release.Revision }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "nt114-fl.labels" . | nindent 4 }}
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: reputation-deploy
    spec:
      restartPolicy: OnFailure
      containers:
        - name: deploy
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "deploy_contract.py"]
          envFrom:
            - configMapRef:
                name: fl-config
          env:
            - name: CONTRACT_ADDRESS_FILE
              value: {{ .Values.contract.addressFile }}
          volumeMounts:
            - name: results
              mountPath: /results
      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: fl-results