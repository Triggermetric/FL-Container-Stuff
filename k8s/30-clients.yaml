apiVersion: apps/v1
kind: Deployment
metadata:
  name: fl-client-1
  namespace: nt114-fl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fl-client-1
  template:
    metadata:
      labels:
        app: fl-client-1
    spec:
      containers:
        - name: fl-client-1
          image: YOUR_ACR_NAME.azurecr.io/project-nt114:latest
          command: ["python", "fl_client.py", "1", "non_iid"]
          envFrom:
            - configMapRef:
                name: fl-config
          env:
            - name: CLIENT_ID
              value: "1"
            - name: FAULTY_CLIENTS
              value: ""
            - name: CONTRACT_ADDRESS_FILE
              value: /results/runtime/reputation-address.json
          volumeMounts:
            - name: results
              mountPath: /app/history
              subPath: history
            - name: results
              mountPath: /app/plots
              subPath: plots
            - name: results
              mountPath: /results
      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: fl-results
